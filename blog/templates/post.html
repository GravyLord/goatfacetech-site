<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TITLE}} — Goatface Tech</title>
  <meta name="description" content="{{DESCRIPTION}}" />
  <link rel="canonical" href="{{URL}}" />

  <!-- Open Graph / Twitter (from post frontmatter — shares render a card) -->
  <meta property="og:type" content="article" />
  <meta property="og:url" content="{{URL}}" />
  <meta property="og:title" content="{{TITLE}}" />
  <meta property="og:description" content="{{DESCRIPTION}}" />
  <meta property="og:image" content="{{OG_IMAGE}}" />
  <meta property="og:site_name" content="Goatface Tech" />
  <meta property="og:locale" content="en_CA" />
  <meta property="article:published_time" content="{{DATE_ISO}}" />
  <meta property="article:author" content="Les Ancion" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{TITLE}}" />
  <meta name="twitter:description" content="{{DESCRIPTION}}" />
  <meta name="twitter:image" content="{{OG_IMAGE}}" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/blog/blog.css" />
</head>
<body>

  <div class="corner-tl"></div>
  <div class="corner-tr"></div>

  <div class="page">

    <nav class="blog-topbar">
      <a class="blog-home" href="/">◄ GOATFACE <span>TECH</span></a>
      <span class="blog-tag">Blog</span>
    </nav>

    <article class="article">
      <p class="eyebrow">{{DATE_HUMAN}} · {{READING}}</p>
      <h1>{{TITLE}}</h1>
      <p class="byline">Les Ancion · Sundre, Alberta</p>

      <div class="prose">
{{CONTENT}}
      </div>

      <a class="back-link" href="/blog/">◄ All posts</a>
    </article>

    <footer>
      <div class="footer-left">
        © 2026 Goatface Tech &nbsp;·&nbsp; Les Ancion<br/>
        Sundre, Alberta &nbsp;·&nbsp; Canada
      </div>
      <nav class="footer-links">
        <a href="/">Home</a>
        <a href="/blog/">Blog</a>
        <a href="https://www.youtube.com/@GoatfaceTech" target="_blank">YouTube</a>
        <a href="mailto:info@goatfacetech.com">Contact</a>
      </nav>
    </footer>

  </div>
</body>
</html>
